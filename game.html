<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.game {
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  gap: 5px;
  margin: 20px auto;
}

.cell {
  width: 100px;
  height: 100px;
  background: #1e293b;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  cursor: pointer;
  border-radius: 10px;
}

.cell:hover {
  background: #334155;
}

button {
  padding: 10px 20px;
  border: none;
  background: #0ea5e9;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0284c7;
}
</style>
</head>

<body>

<div class="game">
  <h1>🔥 Tic Tac Toe</h1>
  <h3 id="status">Player X Turn</h3>

  <marquee behavior="" direction=""><h1>ANIGBOYA.COM</h1></b></marquee>
  

<div class="board" id="board"></div>

  <button onclick="restartGame()">Restart</button>
</div>

<div>
  
  
   
  
</div>


<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let cells = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameActive = true;

function createBoard() {
  board.innerHTML = "";
  cells.forEach((cell, index) => {
    const div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = cell;
    div.addEventListener("click", () => handleClick(index));
    board.appendChild(div);
  });
}

function handleClick(index) {
  if (cells[index] !== "" || !gameActive) return;

  cells[index] = currentPlayer;
  createBoard();
  checkWinner();

  currentPlayer = currentPlayer === "X" ? "O" : "X";
  statusText.innerText = `Player ${currentPlayer} Turn`;
}

function checkWinner() {
  const winPatterns = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for (let pattern of winPatterns) {
    let [a,b,c] = pattern;

    if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
      statusText.innerText = `🎉 Player ${cells[a]} Wins!`;
      gameActive = false;
      return;
    }
  }

  if (!cells.includes("")) {
    statusText.innerText = "😅 It's a Draw!";
    gameActive = false;
  }
}

function restartGame() {
  cells = ["", "", "", "", "", "", "", "", ""];
  currentPlayer = "X";
  gameActive = true;
  statusText.innerText = "Player X Turn";
  createBoard();
}

createBoard();
</script>

</body>
</html>
