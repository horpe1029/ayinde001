<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALENDER APP</title>


<style>
  body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

.app {
  max-width: 400px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #1e293b;
}

.header {
  padding: 15px;
  text-align: center;
  background: #0ea5e9;
  font-weight: bold;
}

.month-bar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #334155;
}

button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.days, .dates {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
}

.days {
  font-size: 12px;
  color: #94a3b8;
  padding: 5px;
}

.dates {
  gap: 6px;
  padding: 10px;
  flex-grow: 1;
}

.date {
  padding: 12px 0;
  background: #475569;
  border-radius: 8px;
  cursor: pointer;
}

.date:hover {
  background: #0ea5e9;
}

.today {
  background: #22c55e;
}

.has-event {
  border: 2px solid #facc15;
}
</style>





</head>
<body>
  <body>

    <div class="app">
    
      <div class="header">📅<h2>YEARLY CALENDER</h2></div>
    
      <div class="month-bar">
        <button onclick="changeMonth(-1)">◀</button>
        <div id="monthYear"></div>
        <button onclick="changeMonth(1)">▶</button>
      </div>
    
      <div class="days">
        <div>Sun</div><div>Mon</div><div>Tue</div>
        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
    
      <div class="dates" id="dates"></div>
    
    </div>
    
    <script>
    let currentDate = new Date();
    let events = JSON.parse(localStorage.getItem("events")) || {};
    
    function renderCalendar() {
      const datesEl = document.getElementById("dates");
      datesEl.innerHTML = "";
    
      let year = currentDate.getFullYear();
      let month = currentDate.getMonth();
    
      document.getElementById("monthYear").innerText =
        currentDate.toLocaleString("default", { month: "long", year: "numeric" });
    
      let firstDay = new Date(year, month, 1).getDay();
      let lastDate = new Date(year, month + 1, 0).getDate();
    
      for (let i = 0; i < firstDay; i++) {
        datesEl.innerHTML += "<div></div>";
      }
    
      for (let d = 1; d <= lastDate; d++) {
        let key = `${year}-${month}-${d}`;
        let today = new Date();
    
        let isToday =
          d === today.getDate() &&
          month === today.getMonth() &&
          year === today.getFullYear();
    
        let hasEvent = events[key];
    
        let div = document.createElement("div");
        div.className = "date";
    
        if (isToday) div.classList.add("today");
        if (hasEvent) div.classList.add("has-event");
    
        div.innerText = d;
    
        div.onclick = () => {
          let note = prompt("Add event:");
          if (note) {
            events[key] = note;
            localStorage.setItem("events", JSON.stringify(events));
            renderCalendar();
          }
        };
    
        datesEl.appendChild(div);
      }
    }
    
    function changeMonth(step) {
      currentDate.setMonth(currentDate.getMonth() + step);
      renderCalendar();
    }
    
    renderCalendar();
    </script>
    
    
      
    
    <footer>
      <marquee behavior="" direction=""><h1>ANIGBOYA</h1></marquee>
    
    </footer>
    
    
    
    
    
    
    














</body>
</html>
